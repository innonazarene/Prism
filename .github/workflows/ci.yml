name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 9 — PHP 8.1 only
          - php: '8.1'
            laravel: '9.*'
            testbench: '7.*'
            phpunit: '^9.0'

          # Laravel 10 — PHP 8.1 & 8.2
          - php: '8.1'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '^10.0'
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '^10.0'

          # Laravel 11 — PHP 8.2 & 8.3
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '^11.0'

          # Laravel 12 — PHP 8.2, 8.3 & 8.4
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '^11.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '^11.0'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/filesystem:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit